<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-section input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-section button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .city-name {
            font-size: 2em;
            color: #333;
            font-weight: bold;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .temperature {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
        }

        .weather-description {
            color: #666;
            font-size: 1.2em;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 1.5em;
            font-weight: bold;
        }

        .forecast-section {
            margin-top: 40px;
        }

        .forecast-section h2 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .forecast-time {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
            margin: 10px 0;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .preset-cities {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .preset-btn {
            padding: 8px 15px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                onkeypress="if(event.key==='Enter') searchWeather()"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="preset-cities">
            <button class="preset-btn" onclick="searchCity('London')">London</button>
            <button class="preset-btn" onclick="searchCity('New York')">New York</button>
            <button class="preset-btn" onclick="searchCity('Tokyo')">Tokyo</button>
            <button class="preset-btn" onclick="searchCity('Paris')">Paris</button>
            <button class="preset-btn" onclick="searchCity('Sydney')">Sydney</button>
            <button class="preset-btn" onclick="searchCity('Dubai')">Dubai</button>
        </div>

        <div id="weatherContainer"></div>
    </div>

    <script>
        const API_BASE = '/api';
        const DEFAULT_CITY = 'London';

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim() || DEFAULT_CITY;
            await fetchAndDisplay(city);
        }

        function searchCity(city) {
            document.getElementById('cityInput').value = city;
            fetchAndDisplay(city);
        }

        async function fetchAndDisplay(city) {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading weather data...</div>';

            try {
                // Fetch current weather
                const weatherResponse = await fetch(`${API_BASE}/weather?city=${encodeURIComponent(city)}`);
                if (!weatherResponse.ok) {
                    throw new Error('City not found');
                }
                const weatherData = await weatherResponse.json();

                // Fetch forecast
                const forecastResponse = await fetch(`${API_BASE}/forecast?city=${encodeURIComponent(city)}`);
                const forecastData = await forecastResponse.json();

                displayWeather(weatherData, forecastData);
            } catch (error) {
                container.innerHTML = `<div class="error-message">❌ ${error.message}. Please try another city.</div>`;
            }
        }

        function displayWeather(weather, forecast) {
            const container = document.getElementById('weatherContainer');
            const iconUrl = `https://openweathermap.org/img/wn/${weather.icon}@4x.png`;

            let html = `
                <div class="weather-card">
                    <div class="weather-header">
                        <div>
                            <div class="city-name">${weather.city}, ${weather.country}</div>
                            <div class="weather-description">${weather.description}</div>
                        </div>
                        <img src="${iconUrl}" class="weather-icon" alt="Weather icon">
                    </div>
                    <div style="text-align: center; margin: 30px 0;">
                        <div class="temperature">${Math.round(weather.temperature)}°C</div>
                        <div style="color: #666; font-size: 0.9em;">Feels like ${Math.round(weather.feels_like)}°C</div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Min / Max</div>
                            <div class="detail-value">${Math.round(weather.temp_min)}°C / ${Math.round(weather.temp_max)}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${weather.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${weather.wind_speed} m/s</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${weather.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cloudiness</div>
                            <div class="detail-value">${weather.clouds}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${weather.visibility / 1000} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Sunrise</div>
                            <div class="detail-value">${weather.sunrise}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Sunset</div>
                            <div class="detail-value">${weather.sunset}</div>
                        </div>
                    </div>
                </div>
            `;

            if (forecast.forecasts && forecast.forecasts.length > 0) {
                html += `
                    <div class="forecast-section">
                        <h2>5-Day Forecast</h2>
                        <div class="forecast-container">
                `;

                // Show forecast for every 24 hours (skip every 8th item for 3-hour intervals)
                for (let i = 0; i < forecast.forecasts.length; i += 8) {
                    const item = forecast.forecasts[i];
                    const forecastIconUrl = `https://openweathermap.org/img/wn/${item.icon}@2x.png`;
                    html += `
                        <div class="forecast-item">
                            <div class="forecast-time">${item.datetime.split(' ')[0]}</div>
                            <img src="${forecastIconUrl}" class="forecast-icon" alt="Weather icon">
                            <div class="forecast-temp">${Math.round(item.temperature)}°C</div>
                            <div style="color: #666; font-size: 0.85em; text-transform: capitalize;">${item.description}</div>
                            <div style="color: #999; font-size: 0.8em; margin-top: 5px;">💧 ${item.humidity}%</div>
                        </div>
                    `;
                }

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Load default city on page load
        window.addEventListener('DOMContentLoaded', () => {
            fetchAndDisplay(DEFAULT_CITY);
        });
    </script>
</body>
</html>
